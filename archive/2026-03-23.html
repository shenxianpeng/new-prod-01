<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 领袖动态 · 2026-03-23</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f7f7f8;
      --surface:      #ffffff;
      --border:       #e4e4e7;
      --text:         #18181b;
      --text-2:       #52525b;
      --text-3:       #a1a1aa;
      --accent:       #2563eb;
      --accent-bg:    #eff6ff;
      --shadow:       0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-hover: 0 4px 16px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* ── Header ── */
    header { margin-bottom: 36px; }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.4px;
    }
    .dateline {
      margin-top: 4px;
      font-size: 13px;
      color: var(--text-3);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      transition: box-shadow .18s ease;
    }
    .card:hover { box-shadow: var(--shadow-hover); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .author {
      font-size: 13px;
      font-weight: 600;
    }
    .time {
      font-size: 12px;
      color: var(--text-3);
      margin-left: auto;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.55;
      margin-bottom: 8px;
    }
    .card-summary {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-2);
      margin-bottom: 14px;
    }
    .card-original {
      font-size: 12px;
      line-height: 1.65;
      color: var(--text-3);
      border-left: 2px solid var(--border);
      padding-left: 12px;
      margin-bottom: 14px;
      font-style: italic;
    }
    .card-link a {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
    }
    .card-link a:hover { text-decoration: underline; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-3);
    }

    /* ── Footer ── */
    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
    }
    footer a { color: var(--text-3); text-decoration: none; }
    footer a:hover { color: var(--text-2); }

    @media (max-width: 560px) {
      .container { padding: 28px 16px 60px; }
      .card { padding: 16px 18px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>AI 领袖动态</h1>
    <p class="dateline">2026-03-23</p>
  </header>

  
    <div class="empty">今日无新内容</div>
  

  <footer>
    <a href="archive/">历史存档</a>
  </footer>

</div>
</body>
</html>
