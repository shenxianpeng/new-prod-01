<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 领袖动态 · 历史存档</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #FAF9F6;
      --surface:      #ffffff;
      --border:       #E8E5DF;
      --text:         #1C1917;
      --text-2:       #78716C;
      --text-3:       #A8A29E;
      --accent:       #B8730A;
      --accent-bg:    #FEF3E2;
      --shadow:       0 1px 3px rgba(28,25,23,.06), 0 1px 2px rgba(28,25,23,.04);
      --shadow-hover: 0 4px 16px rgba(28,25,23,.08), 0 2px 4px rgba(28,25,23,.04);
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    header { margin-bottom: 36px; }
    header h1 {
      font-family: 'Fraunces', 'STSong', 'Songti SC', serif;
      font-size: clamp(28px, 3.5vw, 44px);
      font-weight: 700;
      letter-spacing: -.025em;
      line-height: 1.1;
    }
    .subtitle {
      margin-top: 6px;
      font-size: 13px;
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      color: var(--text-3);
    }
    .subtitle a {
      color: var(--accent);
      text-decoration: none;
    }
    .subtitle a:hover { text-decoration: underline; }

    .archive-list {
      list-style: none;
    }

    .archive-list li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      transition: box-shadow .18s ease;
    }
    .archive-list li:hover { box-shadow: var(--shadow-hover); }

    .archive-list a {
      display: flex;
      align-items: center;
      min-height: 44px;
      padding: 12px 18px;
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
    }
    .archive-list a:hover { text-decoration: underline; }

    .empty {
      text-align: center;
      padding: 80px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-3);
    }

    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
    }
    footer a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 8px;
      color: var(--text-3);
      text-decoration: none;
    }
    footer a:hover { color: var(--text-2); }

    @media (max-width: 560px) {
      .container { padding: 28px 16px 60px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>历史存档</h1>
    <p class="subtitle">共 3 期 · <a href="../">返回首页</a></p>
  </header>

      <li><a href="2026-03-23.html">2026-03-23</a></li>
      
      <li><a href="2026-03-22.html">2026-03-22</a></li>
      
    </ul>
  

  <footer>
    <a href="../">AI 领袖动态</a>
  </footer>

</div>
</body>
</html>
