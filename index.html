<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 领袖动态 · 2026-03-26</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #FAF9F6;
      --surface:      #ffffff;
      --border:       #E8E5DF;
      --text:         #1C1917;
      --text-2:       #78716C;
      --text-3:       #A8A29E;
      --accent:       #B8730A;
      --accent-bg:    #FEF3E2;
      --shadow:       0 1px 3px rgba(28,25,23,.06), 0 1px 2px rgba(28,25,23,.04);
      --shadow-hover: 0 4px 16px rgba(28,25,23,.08), 0 2px 4px rgba(28,25,23,.04);
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* ── Header ── */
    header { margin-bottom: 36px; }
    header h1 {
      font-family: 'Fraunces', 'STSong', 'Songti SC', serif;
      font-size: clamp(28px, 3.5vw, 44px);
      font-weight: 700;
      letter-spacing: -.025em;
      line-height: 1.1;
    }
    .dateline {
      margin-top: 6px;
      font-size: 13px;
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      color: var(--text-3);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 22px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      transition: box-shadow .18s ease;
    }
    .card:hover { box-shadow: var(--shadow-hover); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .author {
      font-size: 13px;
      font-weight: 600;
    }
    .time {
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: var(--text-3);
      margin-left: auto;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.55;
      margin-bottom: 8px;
    }
    .card-summary {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-2);
      margin-bottom: 14px;
    }
    .card-original {
      font-size: 12px;
      line-height: 1.65;
      color: var(--text-3);
      border-left: 2px solid var(--border);
      padding-left: 12px;
      margin-bottom: 14px;
      font-style: italic;
    }
    .card-link a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 2px;
      font-size: 12px;
      font-family: 'Geist Mono', 'JetBrains Mono', monospace;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: .02em;
    }
    .card-link a:hover { text-decoration: underline; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 64px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-3);
    }
    .empty-icon {
      font-size: 28px;
      margin-bottom: 12px;
      opacity: .5;
    }
    .empty-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    .empty-sub {
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .empty-action {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 16px;
      background: var(--accent-bg);
      color: var(--accent);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background .15s;
    }
    .empty-action:hover { background: #fde8c0; }

    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
    }
    footer a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 8px;
      color: var(--text-3);
      text-decoration: none;
    }
    footer a:hover { color: var(--text-2); }

    @media (max-width: 560px) {
      .container { padding: 28px 16px 60px; }
      .card { padding: 16px 18px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>AI 领袖动态</h1>
    <p class="dateline">2026-03-26</p>
  </header>

  
    <div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-title">今日暂无新内容</div>
      <div class="empty-sub">今天的 AI 领袖动态还未抓取，<br>或暂时没有新发布的内容。</div>
      <a href="archive/" class="empty-action">查看历史存档 →</a>
    </div>
  

  <footer>
    <a href="archive/">历史存档</a>
  </footer>

</div>
</body>
</html>
