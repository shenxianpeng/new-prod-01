name: Daily AI Leaders Update

on:
  schedule:
    - cron: "0 1 * * *"   # 01:00 UTC = 北京时间 09:00
  workflow_dispatch:        # 允许手动触发（用于测试）

permissions:
  contents: write           # 允许提交 docs/ 和 processed_ids.json

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/pipeline.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ processed_ids.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily update $(date +%Y-%m-%d)"
          git push
